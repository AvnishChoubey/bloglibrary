<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error – BlogLibrary</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 30px;
        }
        .nav-brand { font-size: 20px; font-weight: 700; color: #333; text-decoration: none; }

        .page-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .error-card {
            text-align: center;
            max-width: 500px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #e53935;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 14px;
        }

        .error-message {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-home {
            display: inline-block;
            padding: 11px 28px;
            background: #007bff;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: .95rem;
            font-weight: 600;
            transition: background .2s;
        }
        .btn-home:hover { background: #0056b3; }

        .btn-back {
            display: inline-block;
            margin-left: 12px;
            padding: 11px 28px;
            border: 1px solid #555;
            color: #333;
            border-radius: 6px;
            text-decoration: none;
            font-size: .95rem;
            transition: background .2s;
        }
        .btn-back:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="/posts">BlogLibrary</a>
</nav>

<div class="page-wrap">
    <div class="error-card">

        <div class="error-code" th:text="${status}">500</div>

        <div class="error-title" th:text="${error != null ? error : 'Something went wrong'}">
            Internal Server Error
        </div>

        <div class="error-message"
             th:text="${message != null and !message.isBlank() ? message : 'An unexpected error occurred. Please try again or go back to the home page.'}">
            An unexpected error occurred.
        </div>

        <div>
            <a href="/posts" class="btn-home">Go to Home</a>
            <a href="javascript:history.back()" class="btn-back">Go Back</a>
        </div>

    </div>
</div>

</body>
</html>
