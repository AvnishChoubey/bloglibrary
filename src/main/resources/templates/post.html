<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title + ' – BlogLibrary'}">Post – BlogLibrary</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; background: #fff; color: #333; }

        /* ── Navbar ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 30px;
            border-bottom: 1px solid #e0e0e0;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav-brand { font-size: 20px; font-weight: 700; color: #333; text-decoration: none; }
        .nav-right  { display: flex; align-items: center; gap: 12px; }

        .btn { display: inline-block; padding: 7px 16px; border-radius: 5px; font-size: .88rem; cursor: pointer; text-decoration: none; border: none; }
        .btn-outline   { border: 1px solid #555; color: #333; background: transparent; }
        .btn-outline:hover { background: #f0f0f0; }
        .btn-primary   { background: #007bff; color: #fff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-warning   { background: #f0a500; color: #fff; }
        .btn-warning:hover { background: #c87f00; }
        .btn-danger    { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #c62828; }
        .btn-sm { padding: 4px 10px; font-size: .8rem; }

        /* ── Content ── */
        .container { max-width: 820px; margin: 0 auto; padding: 48px 30px 80px; }

        /* ── Post header ── */
        .post-back { font-size: .9rem; color: #007bff; text-decoration: none; display: inline-block; margin-bottom: 28px; }
        .post-back:hover { text-decoration: underline; }

        .post-actions { display: flex; gap: 10px; margin-bottom: 28px; }

        .post-title { font-size: 2.6rem; font-weight: 300; line-height: 1.2; margin-bottom: 18px; }

        .post-meta { font-size: .95rem; color: #666; margin-bottom: 14px; }
        .post-meta span + span::before { content: " · "; }

        .tag-list  { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 36px; }
        .tag {
            background: #e8f0fe;
            color: #1a56c0;
            border-radius: 3px;
            padding: 3px 9px;
            font-size: .8rem;
            font-weight: 500;
        }

        .post-content { font-size: 1.1rem; line-height: 1.85; color: #333; white-space: pre-wrap; }

        hr { border: none; border-top: 1px solid #e8e8e8; margin: 50px 0; }

        /* ── Comments ── */
        .section-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; }

        .comment-card {
            border: 1px solid #e8e8e8;
            border-radius: 7px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .comment-author { font-weight: 600; font-size: .95rem; }
        .comment-date   { font-size: .8rem; color: #888; white-space: nowrap; }
        .comment-email  { font-size: .8rem; color: #999; margin-bottom: 8px; }
        .comment-body   { font-size: .95rem; line-height: 1.6; color: #444; }

        .comment-actions { display: flex; gap: 8px; margin-top: 12px; }

        /* Inline edit form */
        .edit-form {
            display: none;
            margin-top: 12px;
        }
        .edit-form textarea {
            width: 100%;
            min-height: 80px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: .92rem;
            font-family: Arial, sans-serif;
            resize: vertical;
        }
        .edit-form textarea:focus { outline: none; border-color: #007bff; }
        .edit-form-actions { display: flex; gap: 8px; margin-top: 8px; }

        /* New comment form */
        .comment-form { margin-top: 32px; }
        .comment-form h3 { font-size: 1.1rem; margin-bottom: 18px; color: #444; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: .88rem; font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            font-size: .93rem;
            font-family: Arial, sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #007bff; }
        .form-group textarea { min-height: 100px; resize: vertical; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a class="nav-brand" href="/posts">BlogLibrary</a>
    <div class="nav-right">
        <a th:if="${currentUserRole == 'AUTHOR' or currentUserRole == 'ADMIN'}"
           href="/posts/create" class="btn btn-primary">+ Write Post</a>
        <span th:if="${currentUserEmail != null}" style="font-size:.9rem;color:#555;" th:text="${currentUserName}"></span>
        <a th:if="${currentUserEmail == null}" href="/login"  class="btn btn-outline">Login</a>
        <a th:if="${currentUserEmail == null}" href="/signup" class="btn btn-outline">Sign Up</a>
        <a th:if="${currentUserEmail != null}" href="/logout" class="btn btn-outline">Logout</a>
    </div>
</nav>

<div class="container">

    <a href="/posts" class="post-back">← All Posts</a>

    <!-- Edit / Delete buttons for post owner or ADMIN -->
    <div class="post-actions"
         th:if="${canManagePost}">
        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning">Edit Post</a>
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post"
              onsubmit="return confirm('Delete this post permanently?')">
            <input type="hidden" name="_method" value="DELETE">
            <button type="submit" class="btn btn-danger">Delete Post</button>
        </form>
    </div>

    <!-- Post -->
    <h1 class="post-title" th:text="${post.title}">Post Title</h1>

    <div class="post-meta">
        <span>By <strong th:text="${post.author}">Author</strong></span>
        <span th:if="${post.publishedAt != null}"
              th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy, HH:mm')}">
            01 Jan 2024, 10:00
        </span>
        <span th:if="${post.publishedAt == null}">Draft</span>
    </div>

    <div class="tag-list" th:if="${post.postTags != null and !post.postTags.isEmpty()}">
        <span class="tag" th:each="pt : ${post.postTags}" th:text="${pt.tag.name}">tag</span>
    </div>

    <div class="post-content" th:text="${post.content}">Post content goes here.</div>

    <hr>

    <!-- ── Comments Section ── -->
    <div>
        <div class="section-title"
             th:text="${#lists.size(comments)} + ' Comment' + (${#lists.size(comments)} != 1 ? 's' : '')">
            0 Comments
        </div>

        <!-- Existing comments -->
        <div th:each="comment : ${comments}" class="comment-card" th:id="'comment-' + ${comment.id}">

            <div class="comment-header">
                <div>
                    <div class="comment-author" th:text="${comment.name}">Name</div>
                    <div class="comment-email"  th:text="${comment.email}">email@example.com</div>
                </div>
                <div class="comment-date"
                     th:if="${comment.createdAt != null}"
                     th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy, HH:mm')}">
                    01 Jan 2024
                </div>
            </div>

            <div class="comment-body" th:id="'body-' + ${comment.id}" th:text="${comment.content}">
                Comment text…
            </div>

            <!-- Edit / Delete: only the post's own author can manage comments -->
            <div class="comment-actions"
                 th:if="${isPostAuthor}">

                <button class="btn btn-warning btn-sm"
                        th:onclick="|toggleEdit(${comment.id})|">Edit</button>

                <form th:action="@{/posts/{pid}/comments/{cid}(pid=${post.id},cid=${comment.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this comment?')">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </div>

            <!-- Inline edit form (hidden by default) -->
            <div class="edit-form" th:id="'edit-' + ${comment.id}" th:if="${isPostAuthor}">
                <form th:action="@{/posts/{pid}/comments/{cid}(pid=${post.id},cid=${comment.id})}"
                      method="post">
                    <input type="hidden" name="_method" value="PUT">
                    <textarea name="content" th:text="${comment.content}"></textarea>
                    <div class="edit-form-actions">
                        <button type="submit" class="btn btn-primary btn-sm">Save</button>
                        <button type="button" class="btn btn-outline btn-sm"
                                th:onclick="|toggleEdit(${comment.id})|">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- New comment form -->
        <div class="comment-form">
            <h3>Leave a Comment</h3>
            <form th:action="@{/posts/{id}/comments(id=${post.id})}"
                  th:object="${commentRequest}"
                  method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name <span style="color:#e53935">*</span></label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email <span style="color:#e53935">*</span></label>
                        <input type="email" id="email" th:field="*{email}" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">Comment <span style="color:#e53935">*</span></label>
                    <textarea id="content" th:field="*{content}" placeholder="Share your thoughts…" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Post Comment</button>
            </form>
        </div>
    </div>

</div>

<script>
    function toggleEdit(commentId) {
        const editDiv  = document.getElementById('edit-' + commentId);
        const bodyDiv  = document.getElementById('body-' + commentId);
        const isHidden = editDiv.style.display === 'none' || editDiv.style.display === '';
        editDiv.style.display  = isHidden ? 'block' : 'none';
        bodyDiv.style.display  = isHidden ? 'none'  : 'block';
    }
</script>
</body>
</html>
