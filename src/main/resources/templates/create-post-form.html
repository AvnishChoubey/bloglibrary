<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Post – BlogLibrary</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; background: #fff; color: #333; }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 30px;
            border-bottom: 1px solid #e0e0e0;
            background: #fff;
        }
        .nav-brand { font-size: 20px; font-weight: 700; color: #333; text-decoration: none; }
        .nav-right  { display: flex; align-items: center; gap: 12px; }
        .btn { display: inline-block; padding: 7px 16px; border-radius: 5px; font-size: .88rem; cursor: pointer; text-decoration: none; border: none; }
        .btn-outline { border: 1px solid #555; color: #333; background: transparent; }
        .btn-outline:hover { background: #f0f0f0; }
        .btn-primary { background: #007bff; color: #fff; }
        .btn-primary:hover { background: #0056b3; }

        .container { max-width: 860px; margin: 0 auto; padding: 40px 30px 80px; }

        .page-title { font-size: 2.4rem; font-weight: 300; margin-bottom: 36px; }

        .alert-error {
            background: #fff0f0;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            padding: .75rem 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            font-size: .9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 7px;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            transition: border-color .2s;
        }
        .form-control:focus { outline: none; border-color: #007bff; }
        .form-control:disabled {
            background: #f5f5f5;
            color: #777;
            cursor: not-allowed;
        }

        textarea.form-control { min-height: 420px; resize: vertical; line-height: 1.7; font-size: 1rem; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

        .publish-row { display: flex; align-items: center; gap: 12px; }
        .publish-row input[type=checkbox] { width: 17px; height: 17px; accent-color: #007bff; cursor: pointer; }
        .publish-row label { font-size: .95rem; font-weight: 500; color: #444; margin-bottom: 0; cursor: pointer; }

        .hint { font-size: .8rem; color: #888; margin-top: 4px; }

        .form-actions { display: flex; gap: 12px; margin-top: 10px; }

        .btn-submit {
            padding: 11px 32px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-submit:hover { background: #0056b3; }
        .btn-cancel { color: #555; text-decoration: none; font-size: .95rem; align-self: center; }
        .btn-cancel:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="/posts">BlogLibrary</a>
    <div class="nav-right">
        <span th:if="${currentUserEmail != null}" style="font-size:.9rem;color:#555;" th:text="${currentUserName}"></span>
        <a href="/logout" class="btn btn-outline">Logout</a>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">New Post</h1>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/posts/create}" th:object="${postRequest}" method="post">

        <!-- Title -->
        <div class="form-group">
            <label for="title">Title <span style="color:#e53935">*</span></label>
            <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="Enter post title" required maxlength="100">
        </div>

        <!-- Author (AUTHOR: disabled · ADMIN: dropdown) -->
        <div class="form-group">
            <label>Author</label>

            <!-- AUTHOR role: locked to own name -->
            <div th:if="${currentUserRole == 'AUTHOR'}">
                <input type="text" class="form-control" th:value="${currentUserName}" disabled>
                <input type="hidden" name="authorId" th:value="${currentUserId}">
            </div>

            <!-- ADMIN role: pick any author -->
            <div th:if="${currentUserRole == 'ADMIN'}">
                <select th:field="*{authorId}" class="form-control">
                    <option value="">Select author</option>
                    <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"></option>
                </select>
            </div>
        </div>

        <!-- Tags -->
        <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" th:field="*{tags}" class="form-control"
                   placeholder="space-separated: spring java tutorial">
            <div class="hint">Separate tags with spaces.</div>
        </div>

        <!-- Publish settings -->
        <div class="two-col">
            <div class="form-group">
                <label>Publish Date &amp; Time</label>
                <input type="datetime-local" name="publishedAt" class="form-control"
                       th:value="${postRequest.publishedAt != null
                           ? #temporals.format(postRequest.publishedAt, 'yyyy-MM-dd''T''HH:mm') : ''}">
                <div class="hint">Leave blank to set automatically on publish.</div>
            </div>
            <div class="form-group" style="display:flex;align-items:center;padding-top:28px;">
                <div class="publish-row">
                    <input type="checkbox" id="isPublished" th:field="*{published}">
                    <label for="isPublished">Publish now</label>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="form-group">
            <label for="content">Content <span style="color:#e53935">*</span></label>
            <textarea id="content" th:field="*{content}" class="form-control" placeholder="Write your post here…" required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Publish</button>
            <a href="/posts" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
