<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – BlogLibrary</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 30px;
        }
        nav a.brand { font-size: 20px; font-weight: 700; color: #333; text-decoration: none; }

        .page-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.09);
        }

        h2 { text-align: center; margin-bottom: 1.75rem; color: #222; font-size: 1.6rem; }

        .alert {
            padding: .75rem 1rem;
            border-radius: 5px;
            margin-bottom: 1.25rem;
            font-size: .92rem;
        }
        .alert-error { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; }

        .form-group { margin-bottom: 1.1rem; }

        label { display: block; font-size: .9rem; font-weight: 600; color: #444; margin-bottom: .4rem; }

        input[type=text], input[type=email], input[type=password] {
            width: 100%;
            padding: .8rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color .2s;
        }
        input:focus { outline: none; border-color: #28a745; box-shadow: 0 0 0 3px rgba(40,167,69,.12); }

        .hint { font-size: .78rem; color: #777; margin-top: .3rem; }

        .btn-primary {
            width: 100%;
            padding: .9rem;
            margin-top: .4rem;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-primary:hover { background: #1e7e34; }

        .footer-link { text-align: center; margin-top: 1.25rem; font-size: .9rem; color: #555; }
        .footer-link a { color: #007bff; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="/posts">BlogLibrary</a>
</nav>

<div class="page-wrap">
    <div class="card">
        <h2>Create Account</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" th:object="${signupRequest}" method="post">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required>
                <div class="hint">8–20 chars · uppercase · lowercase · digit · special (@#$%^&amp;+=!)</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

</body>
</html>
